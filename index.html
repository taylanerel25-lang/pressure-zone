<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Pressure Zone</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover, user-scalable=no">
<meta name="theme-color" content="#050010">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="apple-mobile-web-app-title" content="Pressure Zone">
<link rel="manifest" href="manifest.json">
<style>
html,body{height:100%;margin:0;background:#050010;color:#fff;overscroll-behavior:none}
canvas{display:block;touch-action:none}
html,body,canvas{-webkit-user-select:none;user-select:none;-webkit-touch-callout:none}
</style>
</head>
<body>
<canvas id="canvas"></canvas>
<audio id="bgMusic" src="Main song for Pressure Zone.mp3" loop preload="auto"></audio>
<script>
// ── Device / Canvas ───────────────────────────────────────────────────────────
const isSamsung = /SamsungBrowser|SM-|SAMSUNG|Galaxy/i.test(navigator.userAgent);
const FORCE_DPR_1 = isSamsung;
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d', { alpha: false });
if (!ctx) { document.body.innerHTML = '<p style="color:#fff;text-align:center">Canvas unsupported</p>'; throw new Error('No 2D ctx'); }
ctx.textBaseline = 'top';
let LAST_ERR = '';
window.addEventListener('error', e => { LAST_ERR = (e.error && e.error.stack) || e.message || String(e); });

// ── Layout ────────────────────────────────────────────────────────────────────
let state = 'menu';
let isBoosting = false;
let pressed = new Set();
let S = 1, FONT = {};
let cssW = 0, cssH = 0;

function computeScale() {
  S = Math.max(0.6, Math.min(1.0, Math.min(cssW / 390, cssH / 844)));
  FONT = {
    hudBig:    `bold ${Math.round(48*S)}px monospace`,
    hudMed:    `bold ${Math.round(28*S)}px monospace`,
    hudSmall:  `${Math.round(20*S)}px monospace`,
    hudTiny:   `${Math.round(14*S)}px monospace`,
    menuSmall: `${Math.round(18*S)}px monospace`,
    menuMed:   `bold ${Math.round(32*S)}px monospace`,
    menuTitle: `bold ${Math.round(46*S)}px monospace`,
    level:     `bold ${Math.round(50*S)}px monospace`,
    overTitle: `bold ${Math.round(48*S)}px monospace`,
    overMed:   `${Math.round(28*S)}px monospace`,
    overSmall: `${Math.round(20*S)}px monospace`,
    btn:       `bold ${Math.round(26*S)}px monospace`,
  };
}

// ── Player ────────────────────────────────────────────────────────────────────
const player = { x: 0, y: 0, vy: 0, r: 30 };
let starsA = [], starsB = [], starsC = [];
let bgGrad = null;
let bgGradNebula = null, bgGradVoid = null;

function buildBgGrads() {
  bgGrad = ctx.createLinearGradient(0, 0, cssW, cssH);
  bgGrad.addColorStop(0, '#050010'); bgGrad.addColorStop(0.5, '#000820'); bgGrad.addColorStop(1, '#0d0005');
  bgGradNebula = ctx.createLinearGradient(0, 0, cssW, cssH);
  bgGradNebula.addColorStop(0, '#0d0020'); bgGradNebula.addColorStop(0.5, '#180830'); bgGradNebula.addColorStop(1, '#05001a');
  bgGradVoid = ctx.createLinearGradient(0, 0, cssW, cssH);
  bgGradVoid.addColorStop(0, '#100000'); bgGradVoid.addColorStop(0.5, '#0a0000'); bgGradVoid.addColorStop(1, '#000000');
}

function resize() {
  const dpr = FORCE_DPR_1 ? 1 : Math.max(1, Math.min(2, window.devicePixelRatio || 1));
  cssW = Math.max(1, window.innerWidth); cssH = Math.max(1, window.innerHeight);
  canvas.style.width = cssW + 'px'; canvas.style.height = cssH + 'px';
  if (FORCE_DPR_1) { canvas.width = cssW; canvas.height = cssH; ctx.setTransform(1,0,0,1,0,0); }
  else { canvas.width = Math.floor(cssW*dpr); canvas.height = Math.floor(cssH*dpr); ctx.setTransform(dpr,0,0,dpr,0,0); }
  if (state !== 'playing') { player.x = cssW * 0.5; player.y = cssH * 0.5; }
  computeScale(); player.r = Math.round(24*S); buildBgGrads();
  starsA = []; starsB = []; starsC = [];
  for (let i = 0; i < 90; i++) starsA.push({ x: Math.random()*cssW, y: Math.random()*cssH, r: 0.5+Math.random()*0.5 });
  for (let i = 0; i < 45; i++) starsB.push({ x: Math.random()*cssW, y: Math.random()*cssH, r: 1.0+Math.random()*0.8 });
  for (let i = 0; i < 18; i++) starsC.push({ x: Math.random()*cssW, y: Math.random()*cssH, r: 1.5+Math.random()*1.5 });
  ctx.fillStyle = '#050010'; ctx.fillRect(0, 0, cssW, cssH);
}
addEventListener('resize', resize, { passive: true });
addEventListener('orientationchange', () => { setTimeout(resize, 100); isBoosting = false; pressed.clear(); });
resize();

// ── Assets ────────────────────────────────────────────────────────────────────
const junkImages = [new Image(), new Image(), new Image()];
junkImages[0].src = 'LhXYIPD.png'; junkImages[1].src = 'YApyVR6.png'; junkImages[2].src = 'kp7RKJA.png';
const shipImages = [new Image(), new Image(), new Image(), new Image()];
shipImages[0].src = 'pXg798a.png';
shipImages[1].src = 'pngtree-ufo-colored-cartoon-png-image_6671354.png';
shipImages[2].src = '70f317d9b3a2e913eb596732701caf83.png';
shipImages[3].src = 'bddfc93e9029274b3b6a188f3147a42a.jpg';
const bossImage = new Image(); bossImage.src = 'Space Gov Agency.png';
const playButtonImage = new Image(); playButtonImage.src = 'hfgxdjfx.png';

let currentSkin = 0, currentTrail = 0, currentBg = 0, currentExplosion = 0;
try { currentSkin      = Math.max(0,Math.min(3,parseInt(localStorage.getItem('PZ_SKIN')||'0',10)));      } catch{}
try { currentTrail     = Math.max(0,Math.min(2,parseInt(localStorage.getItem('PZ_TRAIL')||'0',10)));     } catch{}
try { currentBg        = Math.max(0,Math.min(2,parseInt(localStorage.getItem('PZ_BG')||'0',10)));        } catch{}
try { currentExplosion = Math.max(0,Math.min(1,parseInt(localStorage.getItem('PZ_EXPL')||'0',10)));      } catch{}

// ── Upgrades ──────────────────────────────────────────────────────────────────
let upgrades = { boost:0, gravity:0, magnet:0, lives:0, skin1:0, skin2:0, skin3:0,
                 trail1:0, trail2:0, bgNebula:0, bgVoid:0, explBig:0 };
try { const sv = JSON.parse(localStorage.getItem('PZ_UPGRADES')||'{}'); upgrades = Object.assign({}, upgrades, sv); } catch{}
for (const k of Object.keys(upgrades)) { const v = Number(upgrades[k]); upgrades[k] = (Number.isFinite(v)&&v>=0)?(v|0):0; }
let GRAVITY = 300, BOOST_ACCEL = 600, maxLives = 3;
const MAX_FALL = 300, MAX_RISE = -300, AIR_DRAG = 0.995, SAFE_MARGIN_Y = 64;
function applyUpgrades() {
  BOOST_ACCEL = 600*(1+0.2*(upgrades.boost||0));
  GRAVITY = 300*(1-0.1*(upgrades.gravity||0));
  maxLives = 3+(upgrades.lives||0);
}
applyUpgrades();

// ── Audio ─────────────────────────────────────────────────────────────────────
let audioCtx = null, mute = false;
try { mute = localStorage.getItem('PZ_MUTE') === 'true'; } catch{}
const bgMusic = document.getElementById('bgMusic'); bgMusic.volume = 0.2;

function ensureAudio() {
  if (!audioCtx) { const A = window.AudioContext||window.webkitAudioContext; if(!A)return; try{audioCtx=new A();}catch{audioCtx=null;} }
  if (audioCtx && audioCtx.state==='suspended') audioCtx.resume();
}
function playSound(type) {
  if (mute||!audioCtx) return;
  const o = audioCtx.createOscillator(), g = audioCtx.createGain();
  o.connect(g); g.connect(audioCtx.destination);
  let f=650,d=0.04,v=0.08,w='sine';
  if(type==='pass')     {f=750; d=0.05; v=0.12; w='square';}
  if(type==='die')      {f=180; d=0.18; v=0.25; w='sawtooth';}
  if(type==='coin')     {f=1000;d=0.03; v=0.10; w='triangle';}
  if(type==='powerup')  {f=850; d=0.08; v=0.15; w='sine';}
  if(type==='boss')     {f=280; d=0.22; v=0.22; w='sawtooth';}
  if(type==='nearmiss') {f=600; d=0.06; v=0.18; w='square';}
  if(type==='mission')  {f=1100;d=0.12; v=0.18; w='triangle';}
  if(type==='event')    {f=440; d=0.14; v=0.20; w='square';}
  if(type==='tap')      {f=650; d=0.04; v=0.08; w='sine';}
  o.type=w; o.frequency.value=f; g.gain.value=v;
  const t0=audioCtx.currentTime; o.start(t0); o.stop(t0+d);
  g.gain.exponentialRampToValueAtTime(0.0001, t0+d);
}
function toggleMute() { mute=!mute; try{localStorage.setItem('PZ_MUTE',mute);}catch{} ensureAudio(); updateMusic(); }
function updateMusic() {
  if (mute||state!=='playing') { bgMusic.pause(); bgMusic.currentTime=0; }
  else { const p=bgMusic.play(); if(p) p.catch(()=>{}); }
}
const canVibrate = 'vibrate' in navigator;
function vib(p=50) { if(canVibrate) navigator.vibrate(p); }

// ── Helpers ───────────────────────────────────────────────────────────────────
function rand(a,b){ return Math.random()*(b-a)+a; }
function randInt(a,b){ return (Math.random()*(b-a+1)+a)|0; }
function rectCircleOverlap(rx,ry,rw,rh,cx,cy,cr) {
  const sc=0.6, ex=(rw-rw*sc)/2, ey=(rh-rh*sc)/2;
  rx+=ex; ry+=ey; rw*=sc; rh*=sc;
  const dx=cx-Math.max(rx,Math.min(cx,rx+rw)), dy=cy-Math.max(ry,Math.min(cy,ry+rh));
  return dx*dx+dy*dy<=cr*cr;
}
function distToRect(rx,ry,rw,rh,cx,cy) {
  const dx=cx-Math.max(rx,Math.min(cx,rx+rw)), dy=cy-Math.max(ry,Math.min(cy,ry+rh));
  return Math.sqrt(dx*dx+dy*dy);
}
function circleOverlap(x1,y1,r1,x2,y2,r2){ const dx=x1-x2,dy=y1-y2; return dx*dx+dy*dy<=(r1+r2)*(r1+r2); }
function roundRectPath(x,y,w,h,r) {
  ctx.beginPath();
  ctx.moveTo(x+r,y); ctx.arcTo(x+w,y,x+w,y+h,r); ctx.arcTo(x+w,y+h,x,y+h,r);
  ctx.arcTo(x,y+h,x,y,r); ctx.arcTo(x,y,x+w,y,r); ctx.closePath();
}
// Draw text perfectly centred inside a button rect
function btnText(label, cx, cy, font, color, glow) {
  ctx.save(); ctx.textBaseline='middle'; ctx.textAlign='center';
  ctx.font = font; ctx.fillStyle = color;
  if (glow) { ctx.shadowBlur=14; ctx.shadowColor=color; }
  ctx.fillText(label, cx, cy);
  ctx.shadowBlur=0; ctx.restore();
}

// ── Screen Shake ──────────────────────────────────────────────────────────────
let shakeX=0, shakeY=0, shakeDur=0, shakePower=0;
function triggerShake(p,d){ if(p>shakePower){shakePower=p; shakeDur=d;} }
function updateShake(dt) {
  if(shakeDur>0){ shakeDur=Math.max(0,shakeDur-dt); const s=shakePower*(shakeDur/0.3);
    shakeX=(Math.random()-0.5)*2*s; shakeY=(Math.random()-0.5)*2*s;
  } else { shakeX=0; shakeY=0; shakePower=0; }
}

// ── Floating Texts ────────────────────────────────────────────────────────────
let floatingTexts = [];
function addFloatingText(x,y,text,color='#fff',big=false) {
  floatingTexts.push({x,y,text,color,life:1.4,vy:-80-Math.random()*30,big});
}
function updateFloatingTexts(dt) {
  for(let i=floatingTexts.length-1;i>=0;i--){
    const f=floatingTexts[i]; f.y+=f.vy*dt; f.vy*=0.92; f.life-=dt*1.5;
    if(f.life<=0) floatingTexts.splice(i,1);
  }
}
function drawFloatingTexts() {
  ctx.save(); ctx.textBaseline='top';
  for(const f of floatingTexts){
    ctx.globalAlpha=Math.max(0,Math.min(1,f.life));
    ctx.fillStyle=f.color; ctx.textAlign='center';
    ctx.font = f.big ? FONT.hudMed : FONT.hudSmall;
    ctx.fillText(f.text,f.x,f.y);
  }
  ctx.globalAlpha=1; ctx.restore();
}

// ── Stars ─────────────────────────────────────────────────────────────────────
function updateStars(dt) {
  const spd = activeEvent?.type==='COIN_RUSH' ? 2.5 : 1;
  for(const s of starsA){s.x-=12*dt*spd; if(s.x<-2){s.x=cssW+2;s.y=Math.random()*cssH;}}
  for(const s of starsB){s.x-=35*dt*spd; if(s.x<-2){s.x=cssW+2;s.y=Math.random()*cssH;}}
  for(const s of starsC){s.x-=75*dt*spd; if(s.x<-2){s.x=cssW+2;s.y=Math.random()*cssH;}}
}
function drawStars() {
  const starTint = currentBg===1 ? 'rgba(220,180,255,' : currentBg===2 ? 'rgba(255,120,120,' : 'rgba(255,255,255,';
  ctx.fillStyle=starTint+'0.3)'; for(const s of starsA){ctx.beginPath();ctx.arc(s.x,s.y,s.r,0,Math.PI*2);ctx.fill();}
  ctx.fillStyle=starTint+'0.6)'; for(const s of starsB){ctx.beginPath();ctx.arc(s.x,s.y,s.r,0,Math.PI*2);ctx.fill();}
  ctx.fillStyle=starTint+'1)';   for(const s of starsC){ctx.beginPath();ctx.arc(s.x,s.y,s.r,0,Math.PI*2);ctx.fill();}
}

// ── Trail ─────────────────────────────────────────────────────────────────────
let trail = [];
const TRAIL_LENGTH = 28;
function updateTrail() { trail.push({y:player.y,boost:isBoosting,t}); if(trail.length>TRAIL_LENGTH)trail.shift(); }
function drawTrail() {
  if(trail.length<2) return;
  for(let i=1;i<trail.length;i++){
    const frac=i/trail.length, alpha=frac*0.34, w=frac*4*S;
    let col;
    if(currentTrail===1) {
      const hue = (trail[i].t*60)%360;
      col = `hsla(${hue},100%,65%,${alpha})`;
    } else if(currentTrail===2) {
      const r=Math.round(255), g=Math.round(100*frac), b=0;
      col = `rgba(${r},${g},${b},${alpha})`;
    } else {
      col = trail[i].boost ? `rgba(70,255,130,${alpha})` : `rgba(140,200,255,${alpha})`;
    }
    ctx.strokeStyle=col; ctx.lineWidth=w;
    ctx.beginPath(); ctx.moveTo(player.x,trail[i-1].y); ctx.lineTo(player.x,trail[i].y); ctx.stroke();
  }
  ctx.lineWidth=1;
}

// ── Ship ──────────────────────────────────────────────────────────────────────
function drawShip() {
  const tilt=Math.max(-0.6,Math.min(0.6,-player.vy/700));
  ctx.save(); ctx.translate(player.x,player.y); ctx.rotate(tilt);
  const sz=Math.round(80*S);
  if(shieldTimer>0){
    const pulse=0.55+0.45*Math.sin(performance.now()*0.009);
    ctx.strokeStyle=`rgba(0,255,255,${pulse})`; ctx.lineWidth=3*S;
    ctx.shadowBlur=18*S; ctx.shadowColor='#00ffff';
    ctx.beginPath(); ctx.arc(0,0,sz*0.62,0,Math.PI*2); ctx.stroke();
    ctx.shadowBlur=0; ctx.lineWidth=1;
  }
  ctx.shadowBlur=14*S;
  ctx.shadowColor=isBoosting?'#47ff34':'rgba(100,180,255,0.55)';
  const img=shipImages[currentSkin];
  if(img&&img.complete&&img.naturalWidth>0) ctx.drawImage(img,-sz/2,-sz/2,sz,sz);
  else { ctx.fillStyle='#7effa5'; ctx.beginPath(); ctx.ellipse(0,0,sz*0.45,sz*0.28,0,0,Math.PI*2); ctx.fill(); ctx.fillStyle='#a6ffd1'; ctx.beginPath(); ctx.ellipse(0,-sz*0.1,sz*0.22,sz*0.16,0,0,Math.PI*2); ctx.fill(); }
  ctx.shadowBlur=0;
  const up=Math.max(0,-player.vy), flame=Math.min(30*S,8*S+up*0.06);
  if(flame>0.5){
    const jitter=Math.sin(performance.now()*0.022)*2.5*S, baseY=sz/2-25*S;
    ctx.shadowBlur=10*S; ctx.shadowColor='#47ff34';
    ctx.beginPath(); ctx.moveTo(-8*S,baseY); ctx.lineTo(8*S,baseY); ctx.lineTo(0,baseY+flame+jitter); ctx.closePath();
    ctx.fillStyle='#47ff34'; ctx.fill();
    ctx.beginPath(); ctx.moveTo(-5*S,baseY); ctx.lineTo(5*S,baseY); ctx.lineTo(0,baseY+flame*0.65+jitter*0.5); ctx.closePath();
    ctx.fillStyle='#c8ffd4'; ctx.fill();
    ctx.shadowBlur=0;
  }
  ctx.restore();
}

// ── Particles ─────────────────────────────────────────────────────────────────
let particles = [];
function addParticles(x,y,count,color,big=false) {
  const extra = big ? 2.2 : 1;
  for(let i=0;i<count;i++){
    const ang=Math.random()*Math.PI*2, spd=(50+Math.random()*220)*extra;
    particles.push({x,y,vx:Math.cos(ang)*spd,vy:Math.sin(ang)*spd,life:1,color,r:(1.5+Math.random()*2)*extra});
  }
}
function updateParticles(dt) {
  for(let i=particles.length-1;i>=0;i--){
    const p=particles[i]; p.x+=p.vx*dt; p.y+=p.vy*dt; p.vx*=0.93; p.vy*=0.93; p.life-=dt*2.2;
    if(p.life<=0) particles.splice(i,1);
  }
}
function drawParticles() {
  for(const p of particles){
    ctx.globalAlpha=Math.max(0,p.life); ctx.fillStyle=p.color;
    ctx.beginPath(); ctx.arc(p.x,p.y,p.r*S,0,Math.PI*2); ctx.fill();
  }
  ctx.globalAlpha=1;
}

// ── Near Miss ─────────────────────────────────────────────────────────────────
let nearMissStreak = 0, nearMissTimer = 0, nearMissEdgeFlash = 0;
const NEAR_MISS_ZONE = 55; // px from collision surface

function onNearMiss() {
  nearMissStreak++;
  nearMissTimer = 2.8;
  runStats.nearMissRun++;
  const bonus = Math.min(5, nearMissStreak);
  score += bonus;
  if(score>best){best=score;newBestThisRun=true;}
  nearMissEdgeFlash = 1;
  const label = nearMissStreak>=4 ? `INSANE! +${bonus}` : nearMissStreak>=2 ? `HOT! +${bonus}` : `NEAR MISS! +${bonus}`;
  const col   = nearMissStreak>=4 ? '#ff6600' : nearMissStreak>=2 ? '#ffcc00' : '#ffff44';
  addFloatingText(player.x, player.y-50*S, label, col, nearMissStreak>=3);
  playSound('nearmiss'); vib([20,10,20]);
  if(nearMissStreak>=3) triggerShake(4, 0.1);
}
function updateNearMiss(dt) {
  nearMissEdgeFlash = Math.max(0, nearMissEdgeFlash-dt*4);
  if(nearMissTimer>0){ nearMissTimer-=dt; if(nearMissTimer<=0){nearMissStreak=0;nearMissTimer=0;} }
}
function drawNearMissEdge() {
  if(nearMissEdgeFlash<=0) return;
  const a=nearMissEdgeFlash*0.85, brd=12*S;
  ctx.strokeStyle=nearMissStreak>=3?`rgba(255,100,0,${a})`:`rgba(255,255,0,${a})`;
  ctx.lineWidth=brd*2; ctx.strokeRect(0,0,cssW,cssH); ctx.lineWidth=1;
}

// ── Missions ──────────────────────────────────────────────────────────────────
const MISSION_POOL = [
  {id:'surv30',  icon:'⏱', text:'Survive 30s',         stat:'surviveTime', goal:30,  reward:50 },
  {id:'surv60',  icon:'⏱', text:'Survive 60s',         stat:'surviveTime', goal:60,  reward:100},
  {id:'coins10', icon:'◉', text:'Collect 10 coins',    stat:'coinsRun',    goal:10,  reward:75 },
  {id:'coins20', icon:'◉', text:'Collect 20 coins',    stat:'coinsRun',    goal:20,  reward:140},
  {id:'dodge15', icon:'✦', text:'Dodge 15 obstacles',  stat:'dodgesRun',   goal:15,  reward:60 },
  {id:'dodge30', icon:'✦', text:'Dodge 30 obstacles',  stat:'dodgesRun',   goal:30,  reward:110},
  {id:'score50', icon:'★', text:'Score 50 pts',        stat:'score',       goal:50,  reward:80 },
  {id:'boss1',   icon:'👾', text:'Defeat a Boss',       stat:'bossKills',   goal:1,   reward:200},
  {id:'nohit',   icon:'🛡', text:'No damage this run',  stat:'noHit',       goal:1,   reward:150},
  {id:'nm5',     icon:'⚡', text:'5 Near Misses',       stat:'nearMissRun', goal:5,   reward:100},
  {id:'combo3',  icon:'🔥', text:'Reach ×3 combo',     stat:'maxCombo',    goal:3,   reward:80 },
  {id:'coins5',  icon:'◉', text:'Collect 5 coins',     stat:'coinsRun',    goal:5,   reward:35 },
  {id:'surv15',  icon:'⏱', text:'Survive 15s',         stat:'surviveTime', goal:15,  reward:30 },
  {id:'dodge5',  icon:'✦', text:'Dodge 5 obstacles',   stat:'dodgesRun',   goal:5,   reward:25 },
];
let activeMissions = [], missionRefreshPending = false;
let runStats = { surviveTime:0, coinsRun:0, dodgesRun:0, bossKills:0, noHit:1, nearMissRun:0, maxCombo:1 };

function pickMissions() {
  const pool = [...MISSION_POOL];
  activeMissions = [];
  for(let i=0;i<3&&pool.length>0;i++){
    const idx=randInt(0,pool.length-1);
    activeMissions.push({...pool[idx],progress:0,done:false});
    pool.splice(idx,1);
  }
  missionRefreshPending = false;
  try { localStorage.setItem('PZ_MISSIONS', JSON.stringify(activeMissions.map(m=>({id:m.id,done:m.done,progress:m.progress})))); } catch{}
}
function loadMissions() {
  try {
    const sv = JSON.parse(localStorage.getItem('PZ_MISSIONS')||'[]');
    if(sv.length===3){
      activeMissions = sv.map(s=>{ const t=MISSION_POOL.find(m=>m.id===s.id); return t?{...t,...s}:null; }).filter(Boolean);
      if(activeMissions.length===3) return;
    }
  } catch{}
  pickMissions();
}
loadMissions();

function updateMissions(dt) {
  if(state!=='playing') return;
  runStats.surviveTime += dt;
  const stats = { ...runStats, score };
  let completedCount = 0;
  for(const m of activeMissions) {
    if(m.done){ completedCount++; continue; }
    m.progress = Math.min(m.goal, stats[m.stat]||0);
    if(m.progress>=m.goal) {
      m.done=true; completedCount++;
      coinCount+=m.reward;
      try{localStorage.setItem('PZ_COINS',coinCount);}catch{}
      addFloatingText(cssW/2, cssH*0.38, m.icon+' Mission done! +'+m.reward+' ◉', '#ffd700', true);
      playSound('mission'); vib([80,30,80,30,120]);
      triggerShake(5,0.15);
    }
  }
  if(completedCount===3 && !missionRefreshPending) {
    missionRefreshPending=true;
    setTimeout(()=>{ pickMissions(); addFloatingText(cssW/2,cssH*0.45,'✦ NEW MISSIONS ✦','#88ffcc',true); }, 3000);
  }
  try{localStorage.setItem('PZ_MISSIONS',JSON.stringify(activeMissions.map(m=>({id:m.id,done:m.done,progress:m.progress}))));}catch{}
}

function drawMissions() {
  if(state!=='playing') return;
  const pad=10*S, rowH=20*S, panW=Math.round(160*S);
  const panX=cssW-panW-pad, panY=cssH-Math.round(rowH*activeMissions.length+24*S);
  // Background panel
  ctx.fillStyle='rgba(0,0,20,0.65)';
  roundRectPath(panX-4*S, panY-8*S, panW+8*S, rowH*activeMissions.length+20*S, 8*S); ctx.fill();
  ctx.strokeStyle='rgba(100,120,200,0.25)'; ctx.lineWidth=1;
  roundRectPath(panX-4*S, panY-8*S, panW+8*S, rowH*activeMissions.length+20*S, 8*S); ctx.stroke();

  ctx.save(); ctx.textBaseline='top';
  for(let i=0;i<activeMissions.length;i++){
    const m=activeMissions[i], y=panY+i*rowH;
    const frac=Math.min(1,m.progress/m.goal);
    // Progress bar bg
    ctx.fillStyle='rgba(255,255,255,0.1)'; roundRectPath(panX,y+Math.round(12*S),panW,Math.round(5*S),2*S); ctx.fill();
    // Progress bar fill
    if(frac>0){
      ctx.fillStyle=m.done?'#ffd700':frac>=0.75?'#44ffaa':'#4499ff';
      roundRectPath(panX,y+Math.round(12*S),panW*frac,Math.round(5*S),2*S); ctx.fill();
    }
    // Label
    ctx.font=FONT.hudTiny;
    ctx.fillStyle=m.done?'#888888':'#ccddff';
    ctx.textAlign='left';
    const label = m.icon+' '+m.text+(m.done?' ✓':' '+Math.min(m.progress,m.goal)+'/'+m.goal);
    ctx.fillText(label,panX,y);
  }
  ctx.restore();
}

// ── Game Events ───────────────────────────────────────────────────────────────
// Types: COIN_RUSH, DANGER_WAVE, SPEED_BURST, BONUS_ZONE
let activeEvent = null, nextEventIn = 22;
let eventBannerAlpha = 0, eventBannerTimer = 0;
let coinRushTimer = 0;

const EVENT_DEFS = {
  COIN_RUSH:   { label:'COIN RUSH!',    col:'#ffd700', dur:7,  icon:'◉' },
  DANGER_WAVE: { label:'DANGER WAVE!',  col:'#ff4400', dur:8,  icon:'⚡' },
  SPEED_BURST: { label:'SPEED BURST!',  col:'#44aaff', dur:6,  icon:'🚀' },
  BONUS_ZONE:  { label:'BONUS ZONE!',   col:'#44ff88', dur:7,  icon:'★' },
};

function triggerEvent() {
  if(activeEvent) return;
  const types = Object.keys(EVENT_DEFS);
  const type = types[randInt(0,types.length-1)];
  activeEvent = { type, timer:EVENT_DEFS[type].dur };
  eventBannerAlpha=1; eventBannerTimer=2.5;
  addFloatingText(cssW/2, cssH*0.28, EVENT_DEFS[type].icon+' '+EVENT_DEFS[type].label, EVENT_DEFS[type].col, true);
  playSound('event'); vib([50,20,50,20,80]);
  if(type==='DANGER_WAVE') triggerShake(6,0.3);
  nextEventIn = rand(20,35);
}

function updateEvent(dt) {
  if(state!=='playing') return;
  eventBannerAlpha = Math.max(0, eventBannerAlpha-dt*(eventBannerTimer>0?0.5:2));
  if(eventBannerTimer>0) eventBannerTimer-=dt;

  nextEventIn -= dt;
  if(nextEventIn<=0&&!activeEvent&&!boss) triggerEvent();

  if(!activeEvent) return;
  activeEvent.timer -= dt;
  if(activeEvent.timer<=0) {
    if(activeEvent.type==='COIN_RUSH') addFloatingText(cssW/2,cssH*0.4,'Coin Rush Over!','#ffd700');
    activeEvent=null;
  }
  if(activeEvent?.type==='COIN_RUSH'){
    coinRushTimer-=dt;
    if(coinRushTimer<=0){ coinRushTimer=0.28; spawnCoin(); spawnCoin(); }
  }
}

function drawEventBanner() {
  if(!activeEvent||eventBannerAlpha<=0) return;
  const def = EVENT_DEFS[activeEvent.type];
  const bw=Math.round(260*S), bh=Math.round(36*S), bx=cssW/2-bw/2, by=Math.round(cssH*0.12);
  ctx.globalAlpha=eventBannerAlpha*0.85;
  ctx.fillStyle='rgba(0,0,10,0.8)'; roundRectPath(bx,by,bw,bh,10*S); ctx.fill();
  ctx.strokeStyle=def.col; ctx.lineWidth=2; roundRectPath(bx,by,bw,bh,10*S); ctx.stroke();
  // Timer bar
  const prog=activeEvent.timer/EVENT_DEFS[activeEvent.type].dur;
  ctx.fillStyle=def.col+'55'; roundRectPath(bx,by,bw*prog,bh,10*S); ctx.fill();
  ctx.globalAlpha=eventBannerAlpha;
  btnText(def.icon+' '+def.label, cssW/2, by+bh/2, FONT.hudSmall, def.col, false);
  ctx.globalAlpha=1;
}

// ── Scoring ───────────────────────────────────────────────────────────────────
function onScored() {
  let scoreBonus = comboMultiplier;
  if(activeEvent?.type==='BONUS_ZONE') scoreBonus *= 2;
  score += scoreBonus;
  streak++; runStats.dodgesRun++;
  comboMultiplier = 1 + Math.floor(streak/5)*0.5;
  runStats.maxCombo = Math.max(runStats.maxCombo, comboMultiplier);
  playSound('pass'); vib(15);
  const label = comboMultiplier>1 ? `+${scoreBonus} ×${comboMultiplier}` : '+1';
  const col   = comboMultiplier>=3?'#ffd700':comboMultiplier>=2?'#ff9900':'#aaffaa';
  addFloatingText(player.x, player.y-player.r-12, label, col);
  if(score>best){best=score;newBestThisRun=true;}
  if(score%10===0){
    currentLevel++; levelDisplayTimer=2.2; levelDisplayAlpha=1;
    speed=Math.min(380,speed+12); spawnEvery=Math.max(0.8,spawnEvery-0.06);
  }
  if(!dailyCompleted&&score>=dailyGoal){
    dailyCompleted=true; coinCount+=200;
    try{localStorage.setItem('PZ_COINS',coinCount);}catch{}
    try{localStorage.setItem('PZ_DAILY',JSON.stringify({date:lastDailyDate,completed:true}));}catch{}
    addFloatingText(cssW/2,cssH*0.4,'Daily Complete! +200 ◉','#ffd700',true);
  }
}

// ── Boss ──────────────────────────────────────────────────────────────────────
function spawnBoss() {
  obstacles=[]; coins=[]; powerups=[]; activeEvent=null;
  const bw=200*S, bh=100*S, hp=8+currentLevel*2;
  boss={x:cssW+bw*1.2,y:cssH/2,width:bw,height:bh,hp,maxHp:hp,timer:40,flyingAway:false,
        seed:Math.random()*Math.PI*2,freq:rand(2,4.5),amp:rand(40,95),
        state:'flyingIn',searchTimer:3,yTarget:cssH*0.5,hitFlash:0};
  spawnTimer=Infinity; coinSpawnTimer=Infinity; powerupSpawnTimer=Infinity;
  playSound('boss'); vib([200,60,200,60,200]);
  addFloatingText(cssW/2,cssH*0.3,'⚠ BOSS INCOMING ⚠','#ff4400',true);
}

function updateBoss(dt) {
  if(!boss) return;
  let cs=speed; if(slowMoTimer>0) cs*=0.5;
  boss.timer-=dt; boss.hitFlash=Math.max(0,boss.hitFlash-dt*6);
  if(boss.timer<=0||boss.hp<=0) boss.flyingAway=true;
  if(boss.flyingAway){
    boss.x+=cs*2.5*dt;
    if(boss.x>cssW+boss.width*1.5){
      const big=currentExplosion===1;
      addParticles(boss.x-boss.width/2,boss.y,big?60:35,'#ff4400',big);
      addParticles(boss.x-boss.width/2,boss.y,big?40:20,'#ffaa00',big);
      runStats.bossKills++;
      boss=null; bossBullets=[]; bossShootTimer=0;
      currentLevel++; levelDisplayTimer=2.2; levelDisplayAlpha=1;
      spawnTimer=0; coinSpawnTimer=rand(1,2); powerupSpawnTimer=rand(6,12);
      nextEventIn=8; // event soon after boss
    }
    return;
  }
  if(boss.state==='flyingIn'){
    boss.x-=cs*0.55*dt;
    if(boss.x<=cssW-boss.width*0.55){boss.state='searching';boss.searchTimer=2.5;boss.yTarget=rand(SAFE_MARGIN_Y+boss.height,cssH-SAFE_MARGIN_Y-boss.height);}
  } else if(boss.state==='searching'){
    boss.y+=(boss.yTarget-boss.y)*0.07; boss.searchTimer-=dt;
    if(boss.searchTimer<=0) boss.state='positioned';
  } else {
    boss.y+=(player.y-boss.y)*0.014;
    boss.y+=Math.sin(t*boss.freq+boss.seed)*boss.amp*dt;
    boss.y=Math.max(boss.height/2+SAFE_MARGIN_Y,Math.min(cssH-boss.height/2-SAFE_MARGIN_Y,boss.y));
  }
  if(boss.state==='positioned'){
    bossShootTimer+=dt;
    const rate=Math.max(0.45,1.0-(1-boss.hp/boss.maxHp)*0.55);
    if(bossShootTimer>=rate){bossShootTimer=0;bossBullets.push({x:boss.x-boss.width/2,y:boss.y+rand(-boss.height*0.3,boss.height*0.3),vx:-cs*1.6,r:5*S,_crossed:false,_closestDist:9999});}
  }
  for(let i=bossBullets.length-1;i>=0;i--){
    const b=bossBullets[i]; b.x+=b.vx*dt;
    if(b.x<-12){bossBullets.splice(i,1);continue;}
    const bdist=Math.hypot(player.x-b.x,player.y-b.y);
    b._closestDist=Math.min(b._closestDist,bdist-player.r);
    if(circleOverlap(player.x,player.y,player.r,b.x,b.y,b.r)){
      if(shieldTimer>0){bossBullets.splice(i,1);addParticles(player.x,player.y,22,'#00ffff');vib([60,30,60]);continue;}
      addParticles(player.x,player.y,14,'#ff2200',currentExplosion===1);
      flashColor='#ff2200';flashStart=performance.now();flashAlpha=0.48;
      bossBullets.splice(i,1); hit(); continue;
    }
    if(!b._crossed&&b.x<player.x-player.r){
      b._crossed=true;
      boss.hp=Math.max(0,boss.hp-1); boss.hitFlash=1;
      addParticles(boss.x-boss.width/2,boss.y,10,'#ff6600');
      addFloatingText(boss.x-boss.width/2,boss.y-boss.height*0.6,'-1 HP','#ff6600');
      onScored();
      // Near miss on bullet dodge?
      if(b._closestDist>0 && b._closestDist<NEAR_MISS_ZONE*S) onNearMiss();
    }
  }
}

// ── Obstacles ─────────────────────────────────────────────────────────────────
function spawnObstacle() {
  const dir=Math.random()<0.5?1:-1, idx=randInt(0,2);
  let w=Math.round(randInt(80,200)*S);
  if(activeEvent?.type==='DANGER_WAVE') w=Math.round(w*1.3);
  const h=Math.max(Math.round(30*S),Math.round(w*[0.8,0.6,1.0][idx]));
  obstacles.push({dir,x:dir>0?-w:cssW+w,y:rand(32+h/2,cssH-32-h/2),width:w,height:h,speed,seed:Math.random()*10,_crossed:false,_closestDist:9999,imageIndex:idx});
}

function updateObstacles(dt) {
  let cs = speed*(activeEvent?.type==='SPEED_BURST'?1.35:1);
  if(slowMoTimer>0) cs*=0.5;
  const pr=player.x+player.r, pl=player.x-player.r;
  for(let i=obstacles.length-1;i>=0;i--){
    const o=obstacles[i];
    o.x+=o.dir*cs*dt;
    o.y+=Math.sin(t*0.6+o.seed)*12*dt;
    const m=o.height/2+SAFE_MARGIN_Y;
    o.y=Math.max(m,Math.min(cssH-m,o.y));
    const oL=o.dir>0?o.x:o.x-o.width, oR=oL+o.width;
    // Track closest approach for near miss
    if(oL<cssW&&oR>0){
      const d=distToRect(oL,o.y-o.height/2,o.width,o.height,player.x,player.y);
      if(d<(o._closestDist||9999)) o._closestDist=d;
    }
    if(oL<cssW&&oR>0&&rectCircleOverlap(oL,o.y-o.height/2,o.width,o.height,player.x,player.y,player.r)){
      if(shieldTimer>0){obstacles.splice(i,1);addParticles(player.x,player.y,22,'#00ffff');vib([60,30,60]);continue;}
      addParticles(player.x,player.y,14,'#ff2200',currentExplosion===1);
      flashColor='#ff2200'; flashStart=performance.now(); flashAlpha=0.44; triggerShake(12,0.28); hit(); continue;
    }
    const pL=oL-o.dir*cs*dt, pR=oR-o.dir*cs*dt;
    if(!o._crossed&&((o.dir>0&&pL<=pr&&oL>pr)||(o.dir<0&&pR>=pl&&oR<pl))){
      o._crossed=true; onScored();
      // Near miss check: closest was between collision surface and zone
      if(o._closestDist>player.r*1.05 && o._closestDist<player.r+NEAR_MISS_ZONE*S) onNearMiss();
    }
    if(oR<-2||oL>cssW+2) obstacles.splice(i,1);
  }
}

function hit() {
  lives--; streak=0; comboMultiplier=1; runStats.noHit=0; triggerShake(10,0.24);
  if(lives<=0) gameOver();
  else { playSound('die'); vib([150,50,100]); }
}

// ── Coins ─────────────────────────────────────────────────────────────────────
function spawnCoin() {
  coins.push({x:cssW+20,y:rand(50,cssH-50),r:10*S,t:Math.random()*Math.PI*2});
}
function updateCoins(dt) {
  let cs=speed; if(slowMoTimer>0) cs*=0.5;
  const mag=100*(1+(upgrades.magnet||0));
  for(let i=coins.length-1;i>=0;i--){
    const c=coins[i]; c.t+=dt*3.5; c.x-=cs*0.45*dt;
    const dist=Math.hypot(player.x-c.x,player.y-c.y);
    if(dist<mag){c.x+=(player.x-c.x)/dist*130*dt;c.y+=(player.y-c.y)/dist*130*dt;}
    if(circleOverlap(player.x,player.y,player.r,c.x,c.y,c.r)){
      coins.splice(i,1); coinCount++; runStats.coinsRun++; playSound('coin'); vib(25);
      addParticles(c.x,c.y,9,'#ffd700'); addFloatingText(c.x,c.y-16,'+1◉','#ffd700');
    } else if(c.x<-22) coins.splice(i,1);
  }
}

  let cs=speed; if(slowMoTimer>0) cs*=0.5;

}

// ── Draw Objects ──────────────────────────────────────────────────────────────
function drawObstacles() {

function drawBoss() {
  if(!boss) return;
  const bx=boss.x-boss.width/2, by=boss.y-boss.height/2;
  ctx.save();
  if(boss.hitFlash>0){ctx.globalAlpha=0.45+boss.hitFlash*0.55;ctx.filter='brightness(3.5) saturate(0)';}
  const img=bossImage;
  if(img&&img.complete&&img.naturalWidth>0) ctx.drawImage(img,bx,by,boss.width,boss.height);
  else{ctx.fillStyle='#cc3300';ctx.fillRect(bx,by,boss.width,boss.height);}
  ctx.filter='none'; ctx.globalAlpha=1; ctx.restore();
  const bh2=10*S, bby=by-bh2-7*S, frac=Math.max(0,boss.hp/boss.maxHp);
  ctx.fillStyle='#222'; roundRectPath(bx,bby,boss.width,bh2,4*S); ctx.fill();
  ctx.fillStyle=frac>0.5?'#22dd44':frac>0.25?'#ffcc00':'#ff2200';
  roundRectPath(bx,bby,boss.width*frac,bh2,4*S); ctx.fill();
  ctx.strokeStyle='rgba(255,255,255,0.3)';ctx.lineWidth=1;roundRectPath(bx,bby,boss.width,bh2,4*S);ctx.stroke();
  ctx.font=FONT.hudTiny;ctx.fillStyle='#ffaa88';ctx.textAlign='center';
  ctx.fillText('SPACE GOV AGENCY',boss.x,bby-16*S);

function drawBossBullets() {
  ctx.shadowBlur=12*S;ctx.shadowColor='#ff2200';ctx.fillStyle='#ff4400';
  for(const b of bossBullets){ctx.beginPath();ctx.arc(b.x,b.y,b.r,0,Math.PI*2);ctx.fill();}

const PU_COL={shield:'#00ffff',slowmo:'#cc00ff',multiplier:'#ffdd00'};
const PU_LBL={shield:'🛡',slowmo:'⏱',multiplier:'×2'};
function drawCoins() {

    const bob=Math.sin(c.t)*3.5*S;

    ctx.fillStyle='#fff8';ctx.beginPath();ctx.arc(c.x-c.r*0.25,c.y+bob-c.r*0.25,c.r*0.3,0,Math.PI*2);ctx.fill();

function drawPowerups() {

    ctx.strokeStyle=col;ctx.lineWidth=2*S;ctx.beginPath();ctx.arc(p.x,p.y+bob,p.r,0,Math.PI*2);ctx.stroke();

}

// ── HUD ───────────────────────────────────────────────────────────────────────
function drawHUD() {
  const HY=Math.round((cssW<600?38:10)*S), pad=16*S;
  ctx.font=FONT.hudBig;ctx.textAlign='center';
  if(newBestThisRun){ctx.shadowBlur=18;ctx.shadowColor='#ffd700';}

  ctx.font=Math.round(22*S)+'px sans-serif';ctx.fillStyle='#fff';ctx.textAlign='left';
  ctx.fillText(mute?'🔇':'🔊',pad,HY);
  ctx.font=FONT.hudSmall;ctx.fillStyle='#ffd700';
  ctx.fillText('◉ '+coinCount,pad,HY+30*S);
  ctx.fillStyle=lives<=1?'#ff3333':'#ff88aa';
  ctx.fillText('♥'.repeat(lives)+'♡'.repeat(Math.max(0,maxLives-lives)),pad,HY+58*S);
  if(streak>0){

    ctx.font=FONT.hudSmall;

];
let shopBtnRects=[], shopBackRect=null, shopScrollY=0;

function isSkinKey(key){ return ['skin1','skin2','skin3'].includes(key); }
function isTrailKey(key){ return ['trail1','trail2'].includes(key); }
function isBgKey(key){ return ['bgNebula','bgVoid'].includes(key); }
function isEquippable(key){ return isSkinKey(key)||isTrailKey(key)||isBgKey(key)||key==='explBig'; }

function equipItem(key) {
  if(isSkinKey(key))  { currentSkin=parseInt(key.slice(4),10); try{localStorage.setItem('PZ_SKIN',currentSkin);}catch{} }
  if(key==='trail1')  { currentTrail=1; try{localStorage.setItem('PZ_TRAIL',1);}catch{} }
  if(key==='trail2')  { currentTrail=2; try{localStorage.setItem('PZ_TRAIL',2);}catch{} }
  if(key==='bgNebula'){ currentBg=1; buildBgGrads(); try{localStorage.setItem('PZ_BG',1);}catch{} }
  if(key==='bgVoid')  { currentBg=2; buildBgGrads(); try{localStorage.setItem('PZ_BG',2);}catch{} }
  if(key==='explBig') { currentExplosion=1; try{localStorage.setItem('PZ_EXPL',1);}catch{} }
}
function isItemEquipped(key) {
  if(key==='skin1') return currentSkin===1;
  if(key==='skin2') return currentSkin===2;
  if(key==='skin3') return currentSkin===3;
  if(key==='trail1') return currentTrail===1;
  if(key==='trail2') return currentTrail===2;
  if(key==='bgNebula') return currentBg===1;
  if(key==='bgVoid') return currentBg===2;
  if(key==='explBig') return currentExplosion===1;
  return false;
}

function handleShopTap(x, y) {
  const tapY = y + shopScrollY;
  for(const rect of shopBtnRects){
    if(x>=rect.x&&x<=rect.x+rect.w&&tapY>=rect.y&&tapY<=rect.y+rect.h){
      const it=shopItems[rect.idx], own=upgrades[it.key]||0, isFull=own>=it.max;
      if(isFull&&isEquippable(it.key)){
        equipItem(it.key); playSound('tap'); vib(40);
        addFloatingText(cssW/2,cssH*0.5,it.icon+' Equipped!','#88aaff');
      } else if(!isFull&&coinCount>=it.cost){
        coinCount-=it.cost; upgrades[it.key]=own+1;
        try{localStorage.setItem('PZ_COINS',coinCount);}catch{}
        try{localStorage.setItem('PZ_UPGRADES',JSON.stringify(upgrades));}catch{}
        applyUpgrades(); equipItem(it.key); playSound('powerup'); vib(80);
        addFloatingText(cssW/2,cssH*0.5,'Bought: '+it.name+'!','#00ff88');
      } else {
        playSound('tap'); vib(20);
        addFloatingText(cssW/2,cssH*0.5,isFull?'Already maxed!':'Not enough coins!','#ff6644');
      }
      return true;
    }
  }
  if(shopBackRect&&x>=shopBackRect.x&&x<=shopBackRect.x+shopBackRect.w&&y>=shopBackRect.y&&y<=shopBackRect.y+shopBackRect.h){
    state='menu'; playSound('tap'); shopScrollY=0; return true;
  }
  return false;
}

// ── Lifecycle ─────────────────────────────────────────────────────────────────
function gameOver() {
  highscores.push(score);highscores.sort((a,b)=>b-a);highscores=highscores.slice(0,5);
  try{localStorage.setItem('PZ_HIGHSCORES_V1',JSON.stringify(highscores));}catch{}
  try{localStorage.setItem('PZ_COINS',coinCount);}catch{}
  best=highscores[0]||0; state='gameover'; playSound('die');
  flashColor='#ff0000';flashStart=performance.now();flashAlpha=0.55;
  triggerShake(20,0.5); isBoosting=false; pressed.clear(); updateMusic();
}
function startGame(){
  state='playing';
  spawnTimer=spawnEvery*0.5;coinSpawnTimer=rand(1,2.5);powerupSpawnTimer=rand(10,20);
  lives=maxLives;streak=0;comboMultiplier=1;newBestThisRun=false;
  runStats={surviveTime:0,coinsRun:0,dodgesRun:0,bossKills:0,noHit:1,nearMissRun:0,maxCombo:1};
  nearMissStreak=0; nearMissTimer=0; nearMissEdgeFlash=0;
  activeEvent=null; nextEventIn=22; coinRushTimer=0;
  checkDaily(); bgMusic.currentTime=0; updateMusic();
}
function resetGame(){
  obstacles=[];coins=[];powerups=[];boss=null;bossBullets=[];bossShootTimer=0;
  score=0;spawnTimer=0;speed=150;spawnEvery=1.5;surviveTime=0;
  currentLevel=1;levelDisplayTimer=0;levelDisplayAlpha=0;
  player.y=cssH*0.5;player.vy=0;trail=[];floatingTexts=[];particles=[];
  flashAlpha=0;isBoosting=false;pressed.clear();

// ── Input ─────────────────────────────────────────────────────────────────────
canvas.addEventListener('pointerdown', e => {
  ensureAudio();
  if(audioCtx&&audioCtx.state==='suspended') audioCtx.resume();
  e.preventDefault();
  const x=e.clientX,y=e.clientY;
  if(x<60&&y<60){toggleMute();return;}
  if(state==='menu'){
    if(handleMenuTap(x,y)) return;
    resetGame();startGame();pressed.clear();pressed.add(e.pointerId);isBoosting=true;
    playSound('tap');vib([80,20,40]);return;
  }
  if(state==='shop'){handleShopTap(x,y);return;}
  if(state==='gameover'){resetGame();state='menu';playSound('tap');return;}
  pressed.add(e.pointerId);isBoosting=true;playSound('tap');vib([80,20,40]);updateMusic();
},{passive:false});
for(const ev of['pointerup','pointercancel','pointerleave']){
  canvas.addEventListener(ev,e=>{pressed.delete(e.pointerId);isBoosting=pressed.size>0;});
}
canvas.addEventListener('contextmenu',e=>e.preventDefault());
addEventListener('keydown',e=>{
  ensureAudio();
  if(e.key===' '||e.key==='ArrowUp'){
    e.preventDefault();
    if(state==='menu'){resetGame();startGame();}
    if(state==='gameover'){resetGame();state='menu';}
    isBoosting=true;playSound('tap');vib([80,20,40]);updateMusic();
  }
});
addEventListener('keyup',e=>{if(e.key===' '||e.key==='ArrowUp'){e.preventDefault();isBoosting=false;}});
document.addEventListener('visibilitychange',()=>{if(document.hidden){isBoosting=false;pressed.clear();}updateMusic();});

function handleMenuTap(x,y){
  const bw=Math.round(220*S),bh=Math.round(58*S),bx=cssW/2-bw/2;
  if(x>bx&&x<bx+bw){
    if(y>cssH*0.46&&y<cssH*0.46+bh){resetGame();startGame();playSound('tap');return true;}
    if(y>cssH*0.57&&y<cssH*0.57+bh){state='shop';shopScrollY=0;playSound('tap');return true;}
  }
  return false;
}

// ── Main Loop ─────────────────────────────────────────────────────────────────
let lastTime=performance.now();
function loop(now){
  try{
    let dt=Math.min(0.033,Math.max(0,(now-lastTime)/1000));
    lastTime=now; t+=dt;

    if(state==='playing'){
      player.vy+=GRAVITY*dt;
      if(isBoosting) player.vy-=BOOST_ACCEL*dt;
      player.vy=Math.max(MAX_RISE,Math.min(MAX_FALL,player.vy*AIR_DRAG));
      player.y+=player.vy*dt;
      if(player.y-player.r<-1||player.y+player.r>cssH+1) hit();

      // Boss every 5 levels
      if(!boss&&currentLevel>=5&&currentLevel%5===0&&spawnTimer!==Infinity) spawnBoss();

      if(boss){
        updateBoss(dt);
      } else {
        const effectiveSpawnEvery = spawnEvery*(activeEvent?.type==='DANGER_WAVE'?0.38:1);
        spawnTimer+=dt;
        if(spawnTimer>=effectiveSpawnEvery&&obstacles.length<10){spawnTimer=0;spawnObstacle();}
        coinSpawnTimer-=dt;
        if(coinSpawnTimer<=0){spawnCoin();coinSpawnTimer=rand(2.5,5);}
        powerupSpawnTimer-=dt;
        if(powerupSpawnTimer<=0){spawnPowerup();powerupSpawnTimer=rand(12,24);}
        updateObstacles(dt);
      }
      updateCoins(dt);updatePowerups(dt);
      updateTrail();updateLevelDisplay(dt);updateParticles(dt);
      updateFloatingTexts(dt);updateShake(dt);
      updateNearMiss(dt);updateMissions(dt);updateEvent(dt);
    }

    // Background
    const bgG = currentBg===1?bgGradNebula:currentBg===2?bgGradVoid:bgGrad;
    ctx.fillStyle=bgG||'#050010'; ctx.fillRect(0,0,cssW,cssH);

    // Event tint overlay
    if(activeEvent){
      const def=EVENT_DEFS[activeEvent.type];
      const prog=activeEvent.timer/EVENT_DEFS[activeEvent.type].dur;
      ctx.fillStyle=def.col.replace('#','rgba(')+',0.04)'; // very subtle tint
      // simpler tint:
      ctx.save(); ctx.globalAlpha=0.04; ctx.fillStyle=def.col; ctx.fillRect(0,0,cssW,cssH); ctx.restore();
    }

    updateStars(dt); drawStars();

    ctx.save(); ctx.translate(shakeX,shakeY);
    drawObstacles();drawCoins();drawPowerups();
    drawBoss();drawBossBullets();
    drawTrail();drawShip();
    drawParticles();drawFloatingTexts();
    ctx.restore();

    drawNearMissEdge();
    drawMissions();
    drawHUD();
    drawEventBanner();
    if(state!=='playing') drawOverlay();
    updateFlash();drawFlash();
    drawLevelDisplay();

  }catch(e){LAST_ERR=(e&&e.stack)||String(e);console.error('Loop error',e);}
  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);
</script>
<script>
if('serviceWorker' in navigator){navigator.serviceWorker.register('sw.js').catch(()=>{});}
</script>
