<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Pressure Zone</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover, user-scalable=no">
<meta name="theme-color" content="#050010">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="apple-mobile-web-app-title" content="Pressure Zone">
<link rel="manifest" href="manifest.json">
<style>
html,body{height:100%;margin:0;background:#050010;color:#fff;overscroll-behavior:none}
canvas{display:block;touch-action:none}
html,body,canvas{-webkit-user-select:none;user-select:none;-webkit-touch-callout:none}
</style>
</head>
<body>
<canvas id="canvas"></canvas>
<audio id="bgMusic" src="Main song for Pressure Zone.mp3" loop preload="auto"></audio>
<script>
// ── Device / Canvas setup ─────────────────────────────────────────────────────
const isSamsung = /SamsungBrowser|SM-|SAMSUNG|Galaxy/i.test(navigator.userAgent);
const FORCE_DPR_1 = isSamsung;
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d', { alpha: false });
if (!ctx) { document.body.innerHTML = '<p style="color:#fff;text-align:center">Canvas unsupported</p>'; throw new Error('No 2D ctx'); }
ctx.textBaseline = 'top';

let LAST_ERR = '';
window.addEventListener('error', e => { LAST_ERR = (e.error && e.error.stack) || e.message || String(e); });

// ── Layout & scale ────────────────────────────────────────────────────────────
let state = 'menu';
let isBoosting = false;
let pressed = new Set();
let S = 1, FONT = {};
let cssW = 0, cssH = 0;

function computeScale() {
  S = Math.max(0.6, Math.min(1.0, Math.min(cssW / 390, cssH / 844)));
  FONT = {
    hudBig:    `bold ${Math.round(48 * S)}px monospace`,
    hudSmall:  `${Math.round(22 * S)}px monospace`,
    hudTiny:   `${Math.round(15 * S)}px monospace`,
    menuSmall: `${Math.round(20 * S)}px monospace`,
    menuMed:   `bold ${Math.round(36 * S)}px monospace`,
    menuBig:   `bold ${Math.round(52 * S)}px monospace`,
    menuTitle: `bold ${Math.round(46 * S)}px monospace`,
    level:     `bold ${Math.round(50 * S)}px monospace`,
    overTitle: `bold ${Math.round(48 * S)}px monospace`,
    overMed:   `${Math.round(30 * S)}px monospace`,
    overSmall: `${Math.round(21 * S)}px monospace`,
  };
}

// ── Player ────────────────────────────────────────────────────────────────────
const player = { x: 0, y: 0, vy: 0, r: 30 };

// ── Stars (3 parallax layers) ─────────────────────────────────────────────────
let starsA = [], starsB = [], starsC = [];

// ── Background gradient (rebuilt on resize) ───────────────────────────────────
let bgGrad = null;
function buildBgGrad() {
  bgGrad = ctx.createLinearGradient(0, 0, cssW, cssH);
  bgGrad.addColorStop(0,   '#050010');
  bgGrad.addColorStop(0.5, '#000820');
  bgGrad.addColorStop(1,   '#0d0005');
}

function resize() {
  const dpr = FORCE_DPR_1 ? 1 : Math.max(1, Math.min(2, window.devicePixelRatio || 1));
  cssW = Math.max(1, window.innerWidth);
  cssH = Math.max(1, window.innerHeight);
  canvas.style.width  = cssW + 'px';
  canvas.style.height = cssH + 'px';
  if (FORCE_DPR_1) {
    canvas.width  = cssW; canvas.height = cssH;
    ctx.setTransform(1, 0, 0, 1, 0, 0);
  } else {
    canvas.width  = Math.floor(cssW * dpr);
    canvas.height = Math.floor(cssH * dpr);
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  }
  if (state !== 'playing') { player.x = cssW * 0.5; player.y = cssH * 0.5; }
  computeScale();
  player.r = Math.round(24 * S);
  buildBgGrad();
  starsA = []; starsB = []; starsC = [];
  for (let i = 0; i < 90;  i++) starsA.push({ x: Math.random() * cssW, y: Math.random() * cssH, r: 0.5 + Math.random() * 0.5 });
  for (let i = 0; i < 45;  i++) starsB.push({ x: Math.random() * cssW, y: Math.random() * cssH, r: 1.0 + Math.random() * 0.8 });
  for (let i = 0; i < 18;  i++) starsC.push({ x: Math.random() * cssW, y: Math.random() * cssH, r: 1.5 + Math.random() * 1.5 });
  // paint a quick "loading" frame
  ctx.fillStyle = '#050010'; ctx.fillRect(0, 0, cssW, cssH);
}

addEventListener('resize', resize, { passive: true });
addEventListener('orientationchange', () => { setTimeout(resize, 100); isBoosting = false; pressed.clear(); });
resize();

// ── Assets ────────────────────────────────────────────────────────────────────
const junkImages = [new Image(), new Image(), new Image()];
junkImages[0].src = 'LhXYIPD.png';
junkImages[1].src = 'YApyVR6.png';
junkImages[2].src = 'kp7RKJA.png';

const shipImages = [new Image(), new Image(), new Image(), new Image()];
shipImages[0].src = 'pXg798a.png';
shipImages[1].src = 'pngtree-ufo-colored-cartoon-png-image_6671354.png';
shipImages[2].src = '70f317d9b3a2e913eb596732701caf83.png';
shipImages[3].src = 'bddfc93e9029274b3b6a188f3147a42a.jpg';

const bossImage = new Image(); bossImage.src = 'Space Gov Agency.png';
const playButtonImage = new Image(); playButtonImage.src = 'hfgxdjfx.png';

let currentSkin = 0;
try { currentSkin = Math.max(0, Math.min(3, parseInt(localStorage.getItem('PZ_SKIN') || '0', 10))); } catch {}

// ── Input ─────────────────────────────────────────────────────────────────────
canvas.addEventListener('pointerdown', e => {
  ensureAudio();
  if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
  e.preventDefault();
  const x = e.clientX, y = e.clientY;
  if (x < 60 && y < 60) { toggleMute(); return; }
  if (state === 'menu') {
    if (handleMenuTap(x, y)) return;
    resetGame(); startGame(); pressed.clear(); pressed.add(e.pointerId); isBoosting = true;
    playSound('tap'); vib([80, 20, 40]); return;
  }
  if (state === 'shop')    { handleShopTap(x, y); return; }
  if (state === 'gameover') { resetGame(); state = 'menu'; playSound('tap'); return; }
  pressed.add(e.pointerId); isBoosting = true;
  playSound('tap'); vib([80, 20, 40]); updateMusic();
}, { passive: false });

for (const ev of ['pointerup', 'pointercancel', 'pointerleave']) {
  canvas.addEventListener(ev, e => { pressed.delete(e.pointerId); isBoosting = pressed.size > 0; });
}
canvas.addEventListener('contextmenu', e => e.preventDefault());

addEventListener('keydown', e => {
  ensureAudio();
  if (e.key === ' ' || e.key === 'ArrowUp') {
    e.preventDefault();
    if (state === 'menu')     { resetGame(); startGame(); }
    if (state === 'gameover') { resetGame(); state = 'menu'; }
    isBoosting = true; playSound('tap'); vib([80, 20, 40]); updateMusic();
  }
});
addEventListener('keyup', e => { if (e.key === ' ' || e.key === 'ArrowUp') { e.preventDefault(); isBoosting = false; } });
document.addEventListener('visibilitychange', () => { if (document.hidden) { isBoosting = false; pressed.clear(); } updateMusic(); });

// ── Physics constants ─────────────────────────────────────────────────────────
let GRAVITY = 300, BOOST_ACCEL = 600;
const MAX_FALL = 300, MAX_RISE = -300, AIR_DRAG = 0.995, SAFE_MARGIN_Y = 64;
let maxLives = 3;

// ── Upgrades ──────────────────────────────────────────────────────────────────
let upgrades = { boost: 0, gravity: 0, magnet: 0, lives: 0, skin1: 0, skin2: 0, skin3: 0 };
try {
  const saved = JSON.parse(localStorage.getItem('PZ_UPGRADES') || '{}');
  upgrades = Object.assign({}, upgrades, saved);
} catch {}
for (const k of Object.keys(upgrades)) { const v = Number(upgrades[k]); upgrades[k] = (Number.isFinite(v) && v >= 0) ? (v | 0) : 0; }

function applyUpgrades() {
  BOOST_ACCEL = 600 * (1 + 0.2 * (upgrades.boost   || 0));
  GRAVITY     = 300 * (1 - 0.1 * (upgrades.gravity  || 0));
  maxLives    = 3   +          (upgrades.lives    || 0);
}
applyUpgrades();

// ── Audio ─────────────────────────────────────────────────────────────────────
let audioCtx = null, mute = false;
try { mute = localStorage.getItem('PZ_MUTE') === 'true'; } catch {}
const bgMusic = document.getElementById('bgMusic');
bgMusic.volume = 0.2;

function ensureAudio() {
  if (!audioCtx) { const A = window.AudioContext || window.webkitAudioContext; if (!A) return; try { audioCtx = new A(); } catch { audioCtx = null; } }
  if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
}
function playSound(type) {
  if (mute || !audioCtx) return;
  const o = audioCtx.createOscillator(), g = audioCtx.createGain();
  o.connect(g); g.connect(audioCtx.destination);
  let f = 650, d = 0.04, v = 0.08, w = 'sine';
  if (type === 'pass')    { f = 750;  d = 0.05; v = 0.12; w = 'square'; }
  if (type === 'die')     { f = 180;  d = 0.16; v = 0.25; w = 'sawtooth'; }
  if (type === 'coin')    { f = 1000; d = 0.03; v = 0.1;  w = 'triangle'; }
  if (type === 'powerup') { f = 850;  d = 0.06; v = 0.15; w = 'sine'; }
  if (type === 'boss')    { f = 280;  d = 0.22; v = 0.22; w = 'sawtooth'; }
  o.type = w; o.frequency.value = f; g.gain.value = v;
  const t0 = audioCtx.currentTime;
  o.start(t0); o.stop(t0 + d);
  g.gain.exponentialRampToValueAtTime(0.0001, t0 + d);
}
function toggleMute() { mute = !mute; try { localStorage.setItem('PZ_MUTE', mute); } catch {} ensureAudio(); updateMusic(); }
function updateMusic() {
  if (mute || state !== 'playing') { bgMusic.pause(); bgMusic.currentTime = 0; }
  else { const p = bgMusic.play(); if (p) p.catch(() => {}); }
}

const canVibrate = 'vibrate' in navigator;
function vib(pattern = 50) { if (canVibrate) navigator.vibrate(pattern); }

// ── Screen Shake ──────────────────────────────────────────────────────────────
let shakeX = 0, shakeY = 0, shakeDur = 0, shakePower = 0;
function triggerShake(power, dur) { if (power > shakePower) { shakePower = power; shakeDur = dur; } }
function updateShake(dt) {
  if (shakeDur > 0) {
    shakeDur = Math.max(0, shakeDur - dt);
    const s = shakePower * (shakeDur / 0.3);
    shakeX = (Math.random() - 0.5) * 2 * s;
    shakeY = (Math.random() - 0.5) * 2 * s;
  } else { shakeX = 0; shakeY = 0; shakePower = 0; }
}

// ── Floating Score Texts ──────────────────────────────────────────────────────
let floatingTexts = [];
function addFloatingText(x, y, text, color = '#ffffff') {
  floatingTexts.push({ x, y, text, color, life: 1.3, vy: -75 - Math.random() * 25 });
}
function updateFloatingTexts(dt) {
  for (let i = floatingTexts.length - 1; i >= 0; i--) {
    const f = floatingTexts[i];
    f.y += f.vy * dt; f.vy *= 0.93;
    f.life -= dt * 1.6;
    if (f.life <= 0) floatingTexts.splice(i, 1);
  }
}
function drawFloatingTexts() {
  ctx.textAlign = 'center';
  for (const f of floatingTexts) {
    ctx.globalAlpha = Math.max(0, Math.min(1, f.life));
    ctx.fillStyle = f.color;
    ctx.font = FONT.hudSmall;
    ctx.fillText(f.text, f.x, f.y);
  }
  ctx.globalAlpha = 1;
}

// ── Stars ─────────────────────────────────────────────────────────────────────
function updateStars(dt) {
  for (const s of starsA) { s.x -= 12 * dt; if (s.x < -2) { s.x = cssW + 2; s.y = Math.random() * cssH; } }
  for (const s of starsB) { s.x -= 35 * dt; if (s.x < -2) { s.x = cssW + 2; s.y = Math.random() * cssH; } }
  for (const s of starsC) { s.x -= 75 * dt; if (s.x < -2) { s.x = cssW + 2; s.y = Math.random() * cssH; } }
}
function drawStars() {
  ctx.fillStyle = 'rgba(255,255,255,0.3)';
  for (const s of starsA) { ctx.beginPath(); ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2); ctx.fill(); }
  ctx.fillStyle = 'rgba(255,255,255,0.6)';
  for (const s of starsB) { ctx.beginPath(); ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2); ctx.fill(); }
  ctx.fillStyle = '#fff';
  for (const s of starsC) { ctx.beginPath(); ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2); ctx.fill(); }
}

// ── Trail ─────────────────────────────────────────────────────────────────────
let trail = [];
const TRAIL_LENGTH = 26;
function updateTrail() {
  trail.push({ y: player.y, boost: isBoosting });
  if (trail.length > TRAIL_LENGTH) trail.shift();
}
function drawTrail() {
  if (trail.length < 2) return;
  for (let i = 1; i < trail.length; i++) {
    const frac  = i / trail.length;
    const alpha = frac * 0.32;
    const w     = frac * 3.5 * S;
    ctx.strokeStyle = trail[i].boost ? `rgba(70,255,130,${alpha})` : `rgba(140,200,255,${alpha})`;
    ctx.lineWidth = w;
    ctx.beginPath(); ctx.moveTo(player.x, trail[i - 1].y); ctx.lineTo(player.x, trail[i].y); ctx.stroke();
  }
  ctx.lineWidth = 1;
}

// ── Ship ──────────────────────────────────────────────────────────────────────
function drawShip() {
  const tilt = Math.max(-0.6, Math.min(0.6, -player.vy / 700));
  ctx.save();
  ctx.translate(player.x, player.y);
  ctx.rotate(tilt);
  const sz = Math.round(80 * S);

  // Shield ring
  if (shieldTimer > 0) {
    const pulse = 0.55 + 0.45 * Math.sin(performance.now() * 0.009);
    ctx.strokeStyle = `rgba(0,255,255,${pulse})`;
    ctx.lineWidth = 3 * S;
    ctx.shadowBlur = 18 * S; ctx.shadowColor = '#00ffff';
    ctx.beginPath(); ctx.arc(0, 0, sz * 0.62, 0, Math.PI * 2); ctx.stroke();
    ctx.shadowBlur = 0; ctx.lineWidth = 1;
  }

  // Ship glow
  ctx.shadowBlur = 14 * S;
  ctx.shadowColor = isBoosting ? '#47ff34' : 'rgba(100,180,255,0.55)';

  const img = shipImages[currentSkin];
  if (img && img.complete && img.naturalWidth > 0) {
    ctx.drawImage(img, -sz / 2, -sz / 2, sz, sz);
  } else {
    ctx.fillStyle = '#7effa5'; ctx.beginPath(); ctx.ellipse(0, 0, sz * 0.45, sz * 0.28, 0, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = '#a6ffd1'; ctx.beginPath(); ctx.ellipse(0, -sz * 0.1, sz * 0.22, sz * 0.16, 0, 0, Math.PI * 2); ctx.fill();
  }
  ctx.shadowBlur = 0;

  // Flame / thruster
  const up    = Math.max(0, -player.vy);
  const flame = Math.min(30 * S, 8 * S + up * 0.06);
  if (flame > 0.5) {
    const jitter = Math.sin(performance.now() * 0.022) * 2.5 * S;
    const baseY  = sz / 2 - 25 * S;
    ctx.shadowBlur = 10 * S; ctx.shadowColor = '#47ff34';
    ctx.beginPath(); ctx.moveTo(-8 * S, baseY); ctx.lineTo(8 * S, baseY); ctx.lineTo(0, baseY + flame + jitter); ctx.closePath();
    ctx.fillStyle = '#47ff34'; ctx.fill();
    ctx.beginPath(); ctx.moveTo(-5 * S, baseY); ctx.lineTo(5 * S, baseY); ctx.lineTo(0, baseY + flame * 0.65 + jitter * 0.5); ctx.closePath();
    ctx.fillStyle = '#c8ffd4'; ctx.fill();
    ctx.shadowBlur = 0;
  }
  ctx.restore();
}

// ── Particles ─────────────────────────────────────────────────────────────────
let particles = [];
function addParticles(x, y, count, color) {
  for (let i = 0; i < count; i++) {
    const angle = Math.random() * Math.PI * 2;
    const spd   = 50 + Math.random() * 220;
    particles.push({ x, y, vx: Math.cos(angle) * spd, vy: Math.sin(angle) * spd, life: 1, color, r: 1.5 + Math.random() * 2 });
  }
}
function updateParticles(dt) {
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx * dt; p.y += p.vy * dt;
    p.vx *= 0.94; p.vy *= 0.94;
    p.life -= dt * 2.2;
    if (p.life <= 0) particles.splice(i, 1);
  }
}
function drawParticles() {
  for (const p of particles) {
    ctx.globalAlpha = Math.max(0, p.life);
    ctx.fillStyle = p.color;
    ctx.beginPath(); ctx.arc(p.x, p.y, p.r * S, 0, Math.PI * 2); ctx.fill();
  }
  ctx.globalAlpha = 1;
}

// ── Game state ────────────────────────────────────────────────────────────────
let obstacles = [], coins = [], powerups = [];
let boss = null, bossBullets = [], bossShootTimer = 0;
let score = 0, coinCount = 0;
let highscores = [];
try { coinCount = parseInt(localStorage.getItem('PZ_COINS') || '0', 10); } catch {}
try { highscores = JSON.parse(localStorage.getItem('PZ_HIGHSCORES_V1')) || []; } catch {}
if (!Array.isArray(highscores)) highscores = [];
let best = highscores.length ? Math.max(...highscores) : 0;

let spawnTimer = 0, coinSpawnTimer = 0, powerupSpawnTimer = 0;
let speed = 150, spawnEvery = 1.5;
let flashAlpha = 0, flashColor = '#ffffff', flashStart = 0;
const flashDuration = 220;
let t = 0;
let currentLevel = 1, levelDisplayTimer = 0, levelDisplayAlpha = 0;
let lives = maxLives, streak = 0, comboMultiplier = 1;
let shieldTimer = 0, slowMoTimer = 0, multiplierTimer = 0;
let dailyGoal = 150, dailyCompleted = false, lastDailyDate = '';
let newBestThisRun = false;

try { const sd = JSON.parse(localStorage.getItem('PZ_DAILY') || '{}'); lastDailyDate = sd.date || ''; dailyCompleted = sd.completed || false; } catch {}

function checkDaily() {
  const today = new Date().toISOString().slice(0, 10);
  if (today !== lastDailyDate) {
    dailyCompleted = false; lastDailyDate = today;
    try { localStorage.setItem('PZ_DAILY', JSON.stringify({ date: today, completed: false })); } catch {}
  }
}
checkDaily();

function rand(a, b) { return Math.random() * (b - a) + a; }
function randInt(a, b) { return (Math.random() * (b - a + 1) + a) | 0; }

function rectCircleOverlap(rx, ry, rw, rh, cx, cy, cr) {
  const sc = 0.6, ex = (rw - rw * sc) / 2, ey = (rh - rh * sc) / 2;
  rx += ex; ry += ey; rw *= sc; rh *= sc;
  const dx = cx - Math.max(rx, Math.min(cx, rx + rw));
  const dy = cy - Math.max(ry, Math.min(cy, ry + rh));
  return dx * dx + dy * dy <= cr * cr;
}
function circleOverlap(x1, y1, r1, x2, y2, r2) { const dx = x1-x2, dy = y1-y2; return dx*dx+dy*dy <= (r1+r2)*(r1+r2); }

function roundRectPath(x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x+r,y); ctx.arcTo(x+w,y,x+w,y+h,r); ctx.arcTo(x+w,y+h,x,y+h,r);
  ctx.arcTo(x,y+h,x,y,r); ctx.arcTo(x,y,x+w,y,r); ctx.closePath();
}

// ── Scoring ───────────────────────────────────────────────────────────────────
function onScored() {
  score += comboMultiplier;
  streak++;
  comboMultiplier = 1 + Math.floor(streak / 5) * 0.5;
  playSound('pass'); vib(15);
  const label = comboMultiplier > 1 ? `+${comboMultiplier} ×${comboMultiplier}` : '+1';
  const color  = comboMultiplier >= 3 ? '#ffd700' : comboMultiplier >= 2 ? '#ff9900' : '#aaffaa';
  addFloatingText(player.x, player.y - player.r - 12, label, color);
  if (score > best) { best = score; newBestThisRun = true; }
  if (score % 10 === 0) {
    currentLevel++;
    levelDisplayTimer = 2.2; levelDisplayAlpha = 1;
    speed = Math.min(360, speed + 12);
    spawnEvery = Math.max(0.85, spawnEvery - 0.06);
  }
  if (!dailyCompleted && score >= dailyGoal) {
    dailyCompleted = true; coinCount += 200;
    try { localStorage.setItem('PZ_COINS', coinCount); } catch {}
    try { localStorage.setItem('PZ_DAILY', JSON.stringify({ date: lastDailyDate, completed: true })); } catch {}
    addFloatingText(cssW / 2, cssH * 0.4, 'Daily Complete! +200 coins', '#ffd700');
  }
}

// ── Boss ──────────────────────────────────────────────────────────────────────
function spawnBoss() {
  obstacles = []; coins = []; powerups = [];
  const bw = 200 * S, bh = 100 * S;
  const hp = 8 + currentLevel * 2;
  boss = {
    x: cssW + bw * 1.2, y: cssH / 2,
    width: bw, height: bh,
    hp, maxHp: hp,
    timer: 40,
    flyingAway: false,
    seed: Math.random() * Math.PI * 2,
    freq: rand(2, 4.5), amp: rand(40, 95),
    state: 'flyingIn', searchTimer: 3,
    yTarget: cssH * 0.5,
    hitFlash: 0,
  };
  spawnTimer = Infinity; coinSpawnTimer = Infinity; powerupSpawnTimer = Infinity;
  playSound('boss'); vib([200, 60, 200, 60, 200]);
  addFloatingText(cssW / 2, cssH * 0.35, '⚠ BOSS INCOMING ⚠', '#ff4400');
}

function updateBoss(dt) {
  if (!boss) return;
  let cs = speed;
  if (slowMoTimer > 0) cs *= 0.5;

  boss.timer -= dt;
  boss.hitFlash = Math.max(0, boss.hitFlash - dt * 6);

  if (boss.timer <= 0 || boss.hp <= 0) boss.flyingAway = true;

  if (boss.flyingAway) {
    boss.x += cs * 2.5 * dt;
    if (boss.x > cssW + boss.width * 1.5) {
      addParticles(boss.x - boss.width / 2, boss.y, 35, '#ff4400');
      addParticles(boss.x - boss.width / 2, boss.y, 20, '#ffaa00');
      boss = null; bossBullets = []; bossShootTimer = 0;
      currentLevel++;
      levelDisplayTimer = 2.2; levelDisplayAlpha = 1;
      spawnTimer = 0; coinSpawnTimer = rand(1, 2.5); powerupSpawnTimer = rand(8, 16);
    }
    return;
  }

  if (boss.state === 'flyingIn') {
    boss.x -= cs * 0.55 * dt;
    if (boss.x <= cssW - boss.width * 0.55) { boss.state = 'searching'; boss.searchTimer = 2.5; boss.yTarget = rand(SAFE_MARGIN_Y + boss.height, cssH - SAFE_MARGIN_Y - boss.height); }
  } else if (boss.state === 'searching') {
    boss.y += (boss.yTarget - boss.y) * 0.07;
    boss.searchTimer -= dt;
    if (boss.searchTimer <= 0) boss.state = 'positioned';
  } else {
    boss.y += (player.y - boss.y) * 0.014;
    boss.y += Math.sin(t * boss.freq + boss.seed) * boss.amp * dt;
    boss.y = Math.max(boss.height / 2 + SAFE_MARGIN_Y, Math.min(cssH - boss.height / 2 - SAFE_MARGIN_Y, boss.y));
  }

  if (boss.state === 'positioned') {
    bossShootTimer += dt;
    const shootRate = Math.max(0.5, 1.0 - (1 - boss.hp / boss.maxHp) * 0.5); // faster when low HP
    if (bossShootTimer >= shootRate) {
      bossShootTimer = 0;
      bossBullets.push({ x: boss.x - boss.width / 2, y: boss.y + rand(-boss.height * 0.3, boss.height * 0.3), vx: -cs * 1.6, r: 5 * S, _crossed: false });
    }
  }

  for (let i = bossBullets.length - 1; i >= 0; i--) {
    const b = bossBullets[i];
    b.x += b.vx * dt;
    if (b.x < -12) { bossBullets.splice(i, 1); continue; }

    if (circleOverlap(player.x, player.y, player.r, b.x, b.y, b.r)) {
      if (shieldTimer > 0) {
        bossBullets.splice(i, 1);
        addParticles(player.x, player.y, 22, '#00ffff'); vib([60, 30, 60]); continue;
      }
      addParticles(player.x, player.y, 14, '#ff2200');
      flashColor = '#ff2200'; flashStart = performance.now(); flashAlpha = 0.48;
      bossBullets.splice(i, 1);
      hit(); continue;
    }

    // Dodged — deal damage to boss
    if (!b._crossed && b.x < player.x - player.r) {
      b._crossed = true;
      boss.hp = Math.max(0, boss.hp - 1);
      boss.hitFlash = 1;
      addParticles(boss.x - boss.width / 2, boss.y, 10, '#ff6600');
      addFloatingText(boss.x - boss.width / 2, boss.y - boss.height * 0.6, '-1 HP', '#ff6600');
      onScored();
    }
  }
}

// ── Obstacles ─────────────────────────────────────────────────────────────────
function spawnObstacle() {
  const dir = Math.random() < 0.5 ? 1 : -1;
  const idx = randInt(0, 2);
  const w   = Math.round(randInt(80, 200) * S);
  const h   = Math.max(Math.round(30 * S), Math.round(w * [0.8, 0.6, 1.0][idx]));
  obstacles.push({ dir, x: dir > 0 ? -w : cssW + w, y: rand(32 + h / 2, cssH - 32 - h / 2), width: w, height: h, speed, seed: Math.random() * 10, _crossed: false, imageIndex: idx });
}

function updateObstacles(dt) {
  let cs = speed; if (slowMoTimer > 0) cs *= 0.5;
  const pr = player.x + player.r, pl = player.x - player.r;

  for (let i = obstacles.length - 1; i >= 0; i--) {
    const o = obstacles[i];
    o.x += o.dir * cs * dt;
    o.y += Math.sin(t * 0.6 + o.seed) * 12 * dt;
    const m = o.height / 2 + SAFE_MARGIN_Y;
    o.y = Math.max(m, Math.min(cssH - m, o.y));

    const oL = o.dir > 0 ? o.x : o.x - o.width, oR = oL + o.width;
    if (oL < cssW && oR > 0 && rectCircleOverlap(oL, o.y - o.height / 2, o.width, o.height, player.x, player.y, player.r)) {
      if (shieldTimer > 0) { obstacles.splice(i, 1); addParticles(player.x, player.y, 22, '#00ffff'); vib([60, 30, 60]); continue; }
      addParticles(player.x, player.y, 12, '#ff2200');
      flashColor = '#ff2200'; flashStart = performance.now(); flashAlpha = 0.42;
      triggerShake(12, 0.28);
      hit(); continue;
    }

    const pL = oL - o.dir * cs * dt, pR = oR - o.dir * cs * dt;
    if (!o._crossed && ((o.dir > 0 && pL <= pr && oL > pr) || (o.dir < 0 && pR >= pl && oR < pl))) { o._crossed = true; onScored(); }
    if (oR < -2 || oL > cssW + 2) obstacles.splice(i, 1);
  }
}

function hit() {
  lives--;
  streak = 0; comboMultiplier = 1;
  triggerShake(10, 0.24);
  if (lives <= 0) gameOver();
  else { playSound('die'); vib([150, 50, 100]); }
}

// ── Coins ─────────────────────────────────────────────────────────────────────
function spawnCoin() {
  coins.push({ x: cssW + 20, y: rand(50, cssH - 50), r: 10 * S, t: Math.random() * Math.PI * 2 });
}
function updateCoins(dt) {
  let cs = speed; if (slowMoTimer > 0) cs *= 0.5;
  const mag = 100 * (1 + (upgrades.magnet || 0));
  for (let i = coins.length - 1; i >= 0; i--) {
    const c = coins[i];
    c.t += dt * 3.5;
    c.x -= cs * 0.45 * dt;
    const dist = Math.hypot(player.x - c.x, player.y - c.y);
    if (dist < mag) { c.x += (player.x - c.x) / dist * 130 * dt; c.y += (player.y - c.y) / dist * 130 * dt; }
    if (circleOverlap(player.x, player.y, player.r, c.x, c.y, c.r)) {
      coins.splice(i, 1); coinCount++; playSound('coin'); vib(25);
      addParticles(c.x, c.y, 9, '#ffd700');
      addFloatingText(c.x, c.y - 16, '+1', '#ffd700');
    } else if (c.x < -22) coins.splice(i, 1);
  }
}

// ── Powerups ──────────────────────────────────────────────────────────────────
function spawnPowerup() {
  const types = ['shield', 'slowmo', 'multiplier'];
  powerups.push({ type: types[randInt(0, 2)], x: cssW + 20, y: rand(60, cssH - 60), r: 15 * S, t: 0 });
}
function updatePowerups(dt) {
  shieldTimer = Math.max(0, shieldTimer - dt);
  slowMoTimer = Math.max(0, slowMoTimer - dt);
  multiplierTimer = Math.max(0, multiplierTimer - dt);
  if (multiplierTimer > 0) comboMultiplier = 2;
  let cs = speed; if (slowMoTimer > 0) cs *= 0.5;
  for (let i = powerups.length - 1; i >= 0; i--) {
    const p = powerups[i];
    p.t += dt * 2.2;
    p.x -= cs * 0.35 * dt;
    if (circleOverlap(player.x, player.y, player.r, p.x, p.y, p.r)) {
      powerups.splice(i, 1); playSound('powerup'); vib([100]);
      addParticles(p.x, p.y, 18, '#00ff88');
      if (p.type === 'shield')     { shieldTimer = 5;  addFloatingText(p.x, p.y - 22, 'SHIELD!', '#00ffff'); }
      if (p.type === 'slowmo')     { slowMoTimer = 3;  addFloatingText(p.x, p.y - 22, 'SLOW MO!', '#cc00ff'); }
      if (p.type === 'multiplier') { multiplierTimer = 10; addFloatingText(p.x, p.y - 22, '×2 SCORE!', '#ffdd00'); }
    } else if (p.x < -32) powerups.splice(i, 1);
  }
}

// ── Draw obstacles ─────────────────────────────────────────────────────────────
function drawObstacles() {
  for (const o of obstacles) {
    const bx = o.dir > 0 ? o.x : o.x - o.width, by = o.y - o.height / 2;
    if (bx > cssW || bx + o.width < 0) continue;
    ctx.save();
    if (o.dir < 0) { ctx.translate(bx + o.width / 2, 0); ctx.scale(-1, 1); ctx.translate(-(bx + o.width / 2), 0); }
    const img = junkImages[o.imageIndex];
    if (img && img.complete && img.naturalWidth > 0) ctx.drawImage(img, bx, by, o.width, o.height);
    else { ctx.fillStyle = '#556677'; ctx.fillRect(bx, by, o.width, o.height); }
    ctx.restore();
  }
}

function drawBoss() {
  if (!boss) return;
  const bx = boss.x - boss.width / 2, by = boss.y - boss.height / 2;
  ctx.save();
  if (boss.hitFlash > 0) { ctx.globalAlpha = 0.45 + boss.hitFlash * 0.55; ctx.filter = 'brightness(3.5) saturate(0)'; }
  const img = bossImage;
  if (img && img.complete && img.naturalWidth > 0) ctx.drawImage(img, bx, by, boss.width, boss.height);
  else { ctx.fillStyle = '#cc3300'; ctx.fillRect(bx, by, boss.width, boss.height); }
  ctx.filter = 'none'; ctx.globalAlpha = 1; ctx.restore();

  // HP bar background
  const bw = boss.width, bh = 10 * S, bby = by - bh - 7 * S;
  ctx.fillStyle = '#222'; roundRectPath(bx, bby, bw, bh, 4 * S); ctx.fill();
  // HP bar fill
  const frac = Math.max(0, boss.hp / boss.maxHp);
  ctx.fillStyle = frac > 0.5 ? '#22dd44' : frac > 0.25 ? '#ffcc00' : '#ff2200';
  roundRectPath(bx, bby, bw * frac, bh, 4 * S); ctx.fill();
  // HP bar border
  ctx.strokeStyle = 'rgba(255,255,255,0.3)'; ctx.lineWidth = 1; roundRectPath(bx, bby, bw, bh, 4 * S); ctx.stroke();
  // Boss label
  ctx.font = FONT.hudTiny; ctx.fillStyle = '#ffaa88'; ctx.textAlign = 'center';
  ctx.fillText('SPACE GOV AGENCY', boss.x, bby - 16 * S);
}

function drawBossBullets() {
  ctx.shadowBlur = 12 * S; ctx.shadowColor = '#ff2200'; ctx.fillStyle = '#ff4400';
  for (const b of bossBullets) { ctx.beginPath(); ctx.arc(b.x, b.y, b.r, 0, Math.PI * 2); ctx.fill(); }
  ctx.shadowBlur = 0;
}

const PU_COL = { shield: '#00ffff', slowmo: '#cc00ff', multiplier: '#ffdd00' };
const PU_LBL = { shield: '🛡', slowmo: '⏱', multiplier: '×2' };

function drawCoins() {
  for (const c of coins) {
    const bob = Math.sin(c.t) * 3.5 * S;
    ctx.shadowBlur = 10 * S; ctx.shadowColor = '#ffd700';
    ctx.fillStyle = '#ffd700';
    ctx.beginPath(); ctx.arc(c.x, c.y + bob, c.r, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = '#fff8'; // highlight
    ctx.beginPath(); ctx.arc(c.x - c.r * 0.25, c.y + bob - c.r * 0.25, c.r * 0.3, 0, Math.PI * 2); ctx.fill();
    ctx.shadowBlur = 0;
  }
}

function drawPowerups() {
  for (const p of powerups) {
    const bob = Math.sin(p.t) * 4 * S;
    const col = PU_COL[p.type];
    ctx.shadowBlur = 14 * S; ctx.shadowColor = col;
    ctx.fillStyle = col + '88';
    ctx.beginPath(); ctx.arc(p.x, p.y + bob, p.r, 0, Math.PI * 2); ctx.fill();
    ctx.strokeStyle = col; ctx.lineWidth = 2 * S;
    ctx.beginPath(); ctx.arc(p.x, p.y + bob, p.r, 0, Math.PI * 2); ctx.stroke();
    ctx.shadowBlur = 0; ctx.lineWidth = 1;
    ctx.save();
    ctx.textBaseline = 'middle'; ctx.textAlign = 'center';
    ctx.font = `bold ${Math.round(11 * S)}px monospace`;
    ctx.fillStyle = '#fff';
    ctx.fillText(PU_LBL[p.type], p.x, p.y + bob);
    ctx.restore();
  }
}

// ── HUD ───────────────────────────────────────────────────────────────────────
function drawHUD() {
  const HY  = Math.round((cssW < 600 ? 38 : 10) * S);
  const pad = 16 * S;

  // Score (center)
  ctx.font = FONT.hudBig; ctx.textAlign = 'center';
  if (newBestThisRun) { ctx.shadowBlur = 18; ctx.shadowColor = '#ffd700'; }
  ctx.fillStyle = '#fff';
  ctx.fillText(String(score), cssW / 2, HY);
  ctx.shadowBlur = 0;

  // Best (top right)
  ctx.font = FONT.hudTiny; ctx.fillStyle = newBestThisRun ? '#ffd700' : '#888'; ctx.textAlign = 'right';
  ctx.fillText(`BEST ${best}`, cssW - pad, HY + 4 * S);

  // Mute
  ctx.font = `${Math.round(22 * S)}px sans-serif`; ctx.fillStyle = '#fff'; ctx.textAlign = 'left';
  ctx.fillText(mute ? '🔇' : '🔊', pad, HY);

  // Coins
  ctx.font = FONT.hudSmall; ctx.fillStyle = '#ffd700';
  ctx.fillText(`◉ ${coinCount}`, pad, HY + 30 * S);

  // Lives (hearts)
  const full = '♥', empty = '♡';
  ctx.fillStyle = lives <= 1 ? '#ff3333' : '#ff88aa';
  ctx.fillText(full.repeat(lives) + empty.repeat(Math.max(0, maxLives - lives)), pad, HY + 58 * S);

  // Combo
  if (streak > 0) {
    ctx.textAlign = 'center';
    ctx.fillStyle = comboMultiplier >= 3 ? '#ffd700' : comboMultiplier >= 2 ? '#ff9900' : '#99ffbb';
    ctx.font = FONT.hudSmall;
    ctx.fillText(`Combo ×${comboMultiplier}`, cssW / 2, HY + 38 * S);
  }

  // Powerup timers (top right column)
  ctx.textAlign = 'right'; let ty = HY + 28 * S;
  if (shieldTimer     > 0) { ctx.fillStyle = '#00ffff'; ctx.font = FONT.hudTiny; ctx.fillText(`⬡ Shield ${Math.ceil(shieldTimer)}s`, cssW - pad, ty); ty += 20 * S; }
  if (slowMoTimer     > 0) { ctx.fillStyle = '#cc00ff'; ctx.font = FONT.hudTiny; ctx.fillText(`⊘ Slow ${Math.ceil(slowMoTimer)}s`, cssW - pad, ty); ty += 20 * S; }
  if (multiplierTimer > 0) { ctx.fillStyle = '#ffdd00'; ctx.font = FONT.hudTiny; ctx.fillText(`×2 ${Math.ceil(multiplierTimer)}s`, cssW - pad, ty); }

  if (LAST_ERR) {
    ctx.textAlign = 'left'; ctx.font = `${Math.round(13 * S)}px monospace`; ctx.fillStyle = '#f55';
    ctx.fillText(`ERR: ${LAST_ERR.split('\n')[0].slice(0, 80)}`, 12, cssH - 18 * S);
  }
}

// ── Flash / Level display ─────────────────────────────────────────────────────
function updateFlash() {
  if (flashAlpha > 0) { const e = performance.now() - flashStart; flashAlpha = 0.48 * (1 - e / flashDuration); if (flashAlpha < 0) flashAlpha = 0; }
}
function drawFlash() {
  if (flashAlpha <= 0) return;
  ctx.fillStyle = flashColor; ctx.globalAlpha = flashAlpha; ctx.fillRect(0, 0, cssW, cssH); ctx.globalAlpha = 1;
}
function updateLevelDisplay(dt) {
  if (levelDisplayTimer > 0) { levelDisplayTimer -= dt; levelDisplayAlpha = Math.min(1, Math.max(0, levelDisplayTimer / 0.5)); if (levelDisplayTimer <= 0) levelDisplayAlpha = 0; }
}
function drawLevelDisplay() {
  if (levelDisplayAlpha <= 0) return;
  ctx.globalAlpha = levelDisplayAlpha;
  ctx.font = FONT.level; ctx.fillStyle = '#fff'; ctx.textAlign = 'center';
  ctx.shadowBlur = 22; ctx.shadowColor = '#7ef';
  ctx.fillText(boss ? '★ BOSS ★' : `Level ${currentLevel}`, cssW / 2, cssH / 2 - 26 * S);
  ctx.shadowBlur = 0; ctx.globalAlpha = 1;
}

// ── Shop & menu items ─────────────────────────────────────────────────────────
const shopItems = [
  { name: 'Boost +20%',   cost: 500,  key: 'boost',   max: 1 },
  { name: 'Gravity -10%', cost: 1000, key: 'gravity', max: 1 },
  { name: 'Coin Magnet',  cost: 750,  key: 'magnet',  max: 1 },
  { name: 'Extra Life',   cost: 500,  key: 'lives',   max: 2 },
  { name: 'Skin 1',       cost: 300,  key: 'skin1',   max: 1 },
  { name: 'Skin 2',       cost: 300,  key: 'skin2',   max: 1 },
  { name: 'Skin 3',       cost: 300,  key: 'skin3',   max: 1 },
];

function handleMenuTap(x, y) {
  const bw = 200 * S, bh = 60 * S, bx = cssW / 2 - bw / 2;
  if (x > bx && x < bx + bw) {
    if (y > cssH * 0.45 && y < cssH * 0.45 + bh) { resetGame(); startGame(); playSound('tap'); return true; }
    if (y > cssH * 0.56 && y < cssH * 0.56 + bh) { state = 'shop'; playSound('tap'); return true; }
  }
  return false;
}
function handleShopTap(x, y) {
  const itemH = 46 * S, sy = cssH * 0.3;
  for (let i = 0; i < shopItems.length; i++) {
    if (x > cssW * 0.08 && x < cssW * 0.92 && y > sy + i * itemH && y < sy + (i + 1) * itemH) {
      const it = shopItems[i], own = upgrades[it.key] || 0;
      if (coinCount >= it.cost && own < it.max) {
        coinCount -= it.cost; upgrades[it.key] = own + 1;
        try { localStorage.setItem('PZ_COINS', coinCount); } catch {}
        try { localStorage.setItem('PZ_UPGRADES', JSON.stringify(upgrades)); } catch {}
        applyUpgrades();
        if (it.key.startsWith('skin')) { currentSkin = parseInt(it.key.slice(4), 10); try { localStorage.setItem('PZ_SKIN', currentSkin); } catch {} }
        playSound('powerup'); vib(80);
        addFloatingText(cssW / 2, cssH * 0.5, `Bought: ${it.name}!`, '#00ff88');
      } else { playSound('tap'); }
      return true;
    }
  }
  const by = cssH * 0.87;
  if (x > cssW / 2 - 100 * S && x < cssW / 2 + 100 * S && y > by && y < by + 50 * S) { state = 'menu'; playSound('tap'); return true; }
  return false;
}

      ctx.shadowBlur = 0;
    }

    const medalColor = ['#ffd700', '#c0c0c0', '#cd7f32', '#aaa', '#aaa'];
    for (let i = 0; i < highscores.length; i++) {
      ctx.fillStyle = medalColor[i] || '#aaa';
      ctx.fillText(`${i + 1}. ${highscores[i]}`, cssW / 2, cssH * 0.5 + (i + 1) * 28 * S);
    }

    ctx.font = FONT.menuSmall; ctx.fillStyle = '#ccc';
    ctx.fillText('Tap to continue', cssW / 2, cssH * 0.86);
  }
}

// ── Game lifecycle ─────────────────────────────────────────────────────────────
function gameOver() {
  highscores.push(score); highscores.sort((a, b) => b - a); highscores = highscores.slice(0, 5);
  try { localStorage.setItem('PZ_HIGHSCORES_V1', JSON.stringify(highscores)); } catch {}
  try { localStorage.setItem('PZ_COINS', coinCount); } catch {}
  best = highscores[0] || 0;
  state = 'gameover'; playSound('die');
  flashColor = '#ff0000'; flashStart = performance.now(); flashAlpha = 0.55;
  triggerShake(20, 0.5);
  isBoosting = false; pressed.clear(); updateMusic();
}

function startGame() {
  state = 'playing';
  spawnTimer = spawnEvery * 0.5; coinSpawnTimer = rand(1, 2.5); powerupSpawnTimer = rand(10, 20);
  lives = maxLives; streak = 0; comboMultiplier = 1; newBestThisRun = false;
  checkDaily(); bgMusic.currentTime = 0; updateMusic();
}

function resetGame() {
  obstacles = []; coins = []; powerups = [];
  boss = null; bossBullets = []; bossShootTimer = 0;
  score = 0; spawnTimer = 0; speed = 150; spawnEvery = 1.5;
  currentLevel = 1; levelDisplayTimer = 0; levelDisplayAlpha = 0;
  player.y = cssH * 0.5; player.vy = 0; trail = []; floatingTexts = [];
  flashAlpha = 0; isBoosting = false; pressed.clear();
  shieldTimer = 0; slowMoTimer = 0; multiplierTimer = 0;
  updateMusic();
}

// ── Main loop ──────────────────────────────────────────────────────────────────
let lastTime = performance.now();
function loop(now) {
  try {
    let dt = Math.min(0.033, Math.max(0, (now - lastTime) / 1000));
    lastTime = now; t += dt;

    if (state === 'playing') {
      player.vy += GRAVITY * dt;
      if (isBoosting) player.vy -= BOOST_ACCEL * dt;
      player.vy = Math.max(MAX_RISE, Math.min(MAX_FALL, player.vy * AIR_DRAG));
      player.y += player.vy * dt;
      if (player.y - player.r < -1 || player.y + player.r > cssH + 1) hit();

      // Boss spawns every 5 levels starting at level 5
      if (!boss && currentLevel >= 5 && currentLevel % 5 === 0) spawnBoss();

      if (boss) {
        updateBoss(dt);
      } else {
        spawnTimer += dt;
        if (spawnTimer >= spawnEvery && obstacles.length < 8) { spawnTimer = 0; spawnObstacle(); }
        coinSpawnTimer -= dt;
        if (coinSpawnTimer <= 0) { spawnCoin(); coinSpawnTimer = rand(2.5, 5); }
        powerupSpawnTimer -= dt;
        if (powerupSpawnTimer <= 0) { spawnPowerup(); powerupSpawnTimer = rand(12, 24); }
        updateObstacles(dt);
      }
      updateCoins(dt); updatePowerups(dt);
      updateTrail(); updateLevelDisplay(dt); updateParticles(dt); updateFloatingTexts(dt); updateShake(dt);
    }

    // Draw
    ctx.fillStyle = bgGrad || '#050010'; ctx.fillRect(0, 0, cssW, cssH);
    updateStars(dt); drawStars();

    ctx.save();
    ctx.translate(shakeX, shakeY);
    drawObstacles(); drawCoins(); drawPowerups();
    drawBoss(); drawBossBullets();
    drawTrail(); drawShip();
    drawParticles(); drawFloatingTexts();
    ctx.restore();

    drawHUD();
    if (state !== 'playing') drawOverlay();
    updateFlash(); drawFlash();
    drawLevelDisplay();

  } catch (e) { LAST_ERR = (e && e.stack) || String(e); console.error('Loop error', e); }
  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);
</script>
<script>
if ('serviceWorker' in navigator) { navigator.serviceWorker.register('sw.js').catch(() => {}); }
</script>
